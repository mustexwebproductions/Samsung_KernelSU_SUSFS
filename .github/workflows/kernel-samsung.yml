name: Kernel Config - Samsung

permissions:
  contents: write  # Allow writing to repository contents
  actions: write   # Allows triggering actions

on:
  workflow_call:
    inputs:
      susfs:
        required: true
        type: string
      bbg:
        required: true
        type: string
      unicodefix:
        required: true
        type: string
      zeromount:
        required: true
        type: string
      ksun:
        required: true
        type: string
      droidspace:
        required: true
        type: string
      ntsync:
        required: true
        type: string
      bbr:
        required: true
        type: string

jobs:
  build-kernels-a12:
    name: "Samsung-${{ matrix.branch }}-${{ matrix.kernel_version }}-${{ matrix.android_version }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Wir behalten NUR deine Zeile. Das spart stundenlange Wartezeit.
          - branch: "SM-S938B-Oneui7"
            android_version: "android15"
            kernel_version: "6.6"

    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      branch: ${{ matrix.branch }}
      susfs: ${{ inputs.susfs }}
      bbg: ${{ inputs.bbg }}
      unicodefix: ${{ inputs.unicodefix }}
      zeromount: ${{ inputs.zeromount }}
      ksun: ${{ inputs.ksun }}
      droidspace: ${{ inputs.droidspace }}
      ntsync: ${{ inputs.ntsync }}
      bbr: ${{ inputs.bbr }}
